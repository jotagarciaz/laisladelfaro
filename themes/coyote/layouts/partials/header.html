<header class="header">
  <div class="header__title">
    <a href="{{ "" | absLangURL }}">{{ .Site.Title }}</a>
  </div>
  <div class="headerNav">
    <ul class="headerNav__items">
      <li>
        <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Switch to dark mode" style="background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; color: var(--color-link);">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </li>
      <li>
        <a aria-label="Search posts inside this blog." href="{{ "search" | absURL }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </a>
      </li>
    </ul>
  </div>
</header>
